name: Genesis CI/CD

on:
  push:
    branches: [main, hw31]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/genesis
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run syntax checks
        shell: bash
        run: python -m compileall app.py

  build:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        shell: bash
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Save Docker image artifact
        shell: bash
        run: docker save "${IMAGE_NAME}:${IMAGE_TAG}" -o genesis-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: genesis-image
          path: genesis-image.tar
          retention-days: 1

  push:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: genesis-image

      - name: Load Docker image
        shell: bash
        run: docker load -i genesis-image.tar

      - name: Login to DockerHub
        shell: bash
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        shell: bash
        run: docker push "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Push latest tag
        shell: bash
        run: |
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"

  deploy:
    runs-on: self-hosted
    needs: push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Minikube
        shell: bash
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/genesis-deployment genesis="${IMAGE_NAME}:${IMAGE_TAG}" --namespace default
          kubectl rollout status deployment/genesis-deployment --namespace default
          kubectl get pods --namespace default -l app=genesis -o wide
