apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: genesis-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: genesis.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: genesis-service
                port:
                  number: 80
